<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile</title>
    <link rel="stylesheet" href="css/index.css" />
</head>
<body>
<header class="header">
    <div class="top-bar container">
        <a class="logo" href="index.html">LogoPlaceholder</a>
        <a id="user-link" href="user.html">Profile</a>
    </div>
    <nav class="service-bar container">
        <a href="trip.html">Trip</a>
        <a href="hire.html">Hire</a>
        <a href="vanHire.html">Van Hire</a>
    </nav>
</header>

<main class="container user-layout">
    <section class="panel user-panel">
        <h2>User data</h2>
        <div class="booking-section-content">
            <p id="user-message" class="muted"></p>
            <form id="user-form" class="booking-form hidden">
                <label>Name
                    <input id="user-name" type="text" required />
                </label>
                <label>Email
                    <input id="user-email" type="email" required />
                </label>
                <label>Phone
                    <input id="user-phone" type="text" />
                </label>
                <label>Address
                    <input id="user-address" type="text" />
                </label>
                <button class="submit-btn" type="submit">Save changes</button>
            </form>
        </div>
    </section>

    <section class="panel user-panel">
        <h2>History (CANCELLED / COMPLETED)</h2>
        <div id="history-list" class="scroll-area"></div>
    </section>
</main>

<script src="js/headerUser.js"></script>
<script src="js/user.js"></script>
</body>
</html>
