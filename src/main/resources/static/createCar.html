<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Car</title>
    <link rel="stylesheet" href="css/index.css" />
</head>
<body>
<header class="header">
    <div class="top-bar container">
        <a class="logo" href="index.html">LogoPlaceholder</a>
        <a id="user-link" href="user.html">Profile</a>
    </div>
</header>

<main class="container user-layout">
    <section class="panel user-panel">
        <h2>Create Car</h2>
        <p id="create-car-message" class="muted"></p>
        <form id="create-car-form" class="booking-form">
            <label>Model<input id="car-model" name="model" type="text" required /></label>
            <label>Registration Number<input id="car-reg" name="registrationNumber" type="text" required /></label>
            <label>Seats<input id="car-seats" name="seats" type="number" min="1" required /></label>
            <label>Price<input id="car-price" name="price" type="number" min="0" step="0.01" required /></label>
            <label>Class
                <select id="car-tier" name="carClass" required>
                    <option value="ECONOMY">ECONOMY</option>
                    <option value="COMFORT">COMFORT</option>
                    <option value="BUSINESS">BUSINESS</option>
                    <option value="PREMIUM">PREMIUM</option>
                    <option value="VAN">VAN</option>
                </select>
            </label>
            <label class="checkbox-label"><input id="car-available" name="available" type="checkbox" checked /> Available</label>
            <button class="submit-btn" type="submit">Create Car</button>
        </form>
    </section>
</main>
<script src="js/createCar.js"></script>
</body>
</html>
